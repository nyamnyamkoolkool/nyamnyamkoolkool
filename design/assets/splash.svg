<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-label="냠냠쿨쿨 스플래시 — 잘 먹고 잘 자는 다정한 동행">
  <title>냠냠쿨쿨 — 스플래시 (Coral, 애니메이션)</title>

  <defs>
    <!-- 부드러운 워밍 글로우 -->
    <radialGradient id="bgGlow" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#F2A088"/>
      <stop offset="55%" stop-color="#E97A5C"/>
      <stop offset="100%" stop-color="#CC5E40"/>
    </radialGradient>

    <!-- 얼굴 카드 그림자 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="390" height="844" fill="url(#bgGlow)"/>

  <!-- ───────────────────────────────────────────────────────
       상단 별빛 — 평온한 밤, 다른 위상으로 천천히 깜빡
       =========================================================== -->
  <g fill="#FFF1E6">
    <circle cx="62" cy="120" r="1.6">
      <animate attributeName="opacity" values="0.18; 0.45; 0.18"
               dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="160" r="2.2">
      <animate attributeName="opacity" values="0.28; 0.55; 0.28"
               dur="4.4s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="98" cy="220" r="1.4">
      <animate attributeName="opacity" values="0.18; 0.42; 0.18"
               dur="3.6s" begin="-0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="338" cy="92" r="1.8">
      <animate attributeName="opacity" values="0.22; 0.5; 0.22"
               dur="2.8s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="260" r="1.2">
      <animate attributeName="opacity" values="0.15; 0.38; 0.15"
               dur="4.0s" begin="-2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ───────────────────────────────────────────────────────
       중앙 얼굴 카드 — "호흡" 애니메이션 (center origin scale)
       카드 중심: 195, 374 / 카드 좌상단: 89, 268
       =========================================================== -->
  <g transform="translate(195, 374)">
    <!-- 호흡: 1.0 → 1.025 → 1.0, 3.6s, 잠든 아기의 살아있는 느낌 -->
    <animateTransform attributeName="transform" type="scale"
                      values="1; 1.025; 1"
                      dur="3.6s" repeatCount="indefinite"
                      calcMode="spline"
                      keyTimes="0; 0.5; 1"
                      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
                      additive="sum"/>

    <g transform="translate(-106, -106)" filter="url(#cardShadow)">
      <!-- 카드 (cream 배경) -->
      <rect width="212" height="212" rx="48" fill="#FFF1E6"/>
      <!-- 얼굴 원 -->
      <circle cx="106" cy="113" r="62" fill="#FFE3D2"/>

      <!-- 감긴 눈 + 미소 입 -->
      <g stroke="#3A1F12" stroke-linecap="round" fill="none">
        <path d="M68,105 Q81,90 94,105" stroke-width="6.2"/>
        <path d="M118,105 Q131,90 144,105" stroke-width="6.2"/>
        <!-- 입꼬리: 미세하게 더 올라갔다 내려옴 (만족스러운 꿈) -->
        <path d="M90,134 Q106,148 122,134" stroke-width="5.4">
          <animate attributeName="d"
                   values="M90,134 Q106,148 122,134;
                           M90,133 Q106,150 122,133;
                           M90,134 Q106,148 122,134"
                   dur="4.8s" repeatCount="indefinite"
                   calcMode="spline"
                   keyTimes="0; 0.5; 1"
                   keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
        </path>
      </g>

      <!-- 두 볼: "잘 먹은 후" 발그레 톤 변화 -->
      <ellipse cx="61" cy="129" rx="9.2" ry="6.3" fill="#E97A5C">
        <animate attributeName="opacity" values="0.25; 0.42; 0.25"
                 dur="4.0s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="151" cy="129" rx="9.2" ry="6.3" fill="#E97A5C">
        <animate attributeName="opacity" values="0.25; 0.42; 0.25"
                 dur="4.0s" begin="-0.4s" repeatCount="indefinite"/>
      </ellipse>

      <!-- zZ — 우상단에서 떠오르며 페이드 (잘 잔다) -->
      <g fill="#3A1F12" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700">
        <text x="172" y="44" font-size="20">z
          <animate attributeName="opacity" values="0; 0.6; 0.6; 0"
                   dur="2.6s" keyTimes="0; 0.35; 0.7; 1"
                   repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate"
                            values="0,4; 0,-2; 0,-10; 0,-16"
                            dur="2.6s" keyTimes="0; 0.35; 0.7; 1"
                            repeatCount="indefinite"/>
        </text>
        <text x="186" y="32" font-size="14">z
          <animate attributeName="opacity" values="0; 0; 0.5; 0.5; 0"
                   dur="2.6s" keyTimes="0; 0.2; 0.55; 0.85; 1"
                   repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate"
                            values="0,4; 0,2; 0,-4; 0,-10; 0,-14"
                            dur="2.6s" keyTimes="0; 0.2; 0.55; 0.85; 1"
                            repeatCount="indefinite"/>
        </text>
      </g>
    </g>
  </g>

  <!-- ───────────────────────────────────────────────────────
       워드마크 + 슬로건 — 페이드 인 후 정적 유지
       =========================================================== -->
  <text x="195" y="540"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Pretendard', sans-serif"
        font-size="38" font-weight="800" fill="#FFF1E6"
        letter-spacing="-1.2">냠냠쿨쿨
    <animate attributeName="opacity" values="0; 0; 1"
             dur="1.0s" keyTimes="0; 0.2; 1" fill="freeze"/>
  </text>

  <text x="195" y="572"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Pretendard', sans-serif"
        font-size="13.5" font-weight="500" fill="#FFF1E6" opacity="0"
        letter-spacing="-0.2">잘 먹고 잘 자는, 다정한 동행
    <animate attributeName="opacity" values="0; 0; 0.82"
             dur="1.4s" keyTimes="0; 0.45; 1" fill="freeze"/>
  </text>

  <!-- ───────────────────────────────────────────────────────
       하단 로딩 점 — 좌 → 중 → 우 순차 흐름
       =========================================================== -->
  <g fill="#FFF1E6">
    <circle cx="180" cy="772" r="3" opacity="0.35">
      <animate attributeName="opacity" values="0.35; 0.95; 0.35; 0.35; 0.35"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3; 3.6; 3; 3; 3"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="772" r="3" opacity="0.35">
      <animate attributeName="opacity" values="0.35; 0.35; 0.95; 0.35; 0.35"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3; 3; 3.6; 3; 3"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="772" r="3" opacity="0.35">
      <animate attributeName="opacity" values="0.35; 0.35; 0.35; 0.95; 0.35"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3; 3; 3; 3.6; 3"
               keyTimes="0; 0.2; 0.5; 0.8; 1"
               dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>울음 분석 · 녹음 — 냠냠쿨쿨</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<link rel="apple-touch-icon" href="../assets/icon.svg" />
<link rel="stylesheet" href="../css/tokens.css" />
<link rel="stylesheet" href="../css/base.css" />
<style>
  .rec-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: var(--s-5) var(--s-4) var(--s-6);
    text-align: center;
    background:
      radial-gradient(80% 50% at 50% 30%, var(--c-cry-soft) 0%, transparent 70%),
      var(--bg);
  }
  .rec-hd {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    margin-top: var(--s-4);
  }
  .rec-hd .pill { background: var(--c-cry-soft); color: var(--c-cry); }
  .rec-hd h2 { color: var(--fg-strong); }
  .rec-hd p { color: var(--muted); font-size: var(--fs-14); max-width: 28ch; }

  .rec-mid {
    display: flex; flex-direction: column; align-items: center; gap: var(--s-4);
    width: 100%;
  }
  .timer {
    font-family: var(--font-num);
    font-variant-numeric: tabular-nums;
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--fg-strong);
  }
  .timer-sub {
    font-size: var(--fs-13);
    color: var(--muted);
    margin-top: -4px;
  }
  .min-mark {
    height: 4px;
    width: 240px;
    max-width: 70vw;
    background: var(--bg-elev);
    border-radius: var(--r-pill);
    position: relative;
    overflow: hidden;
  }
  .min-mark__fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    background: var(--c-cry);
    border-radius: inherit;
    transition: width 100ms linear;
  }
  .min-mark__tick {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--muted-2);
    left: 33.33%;
  }
  .min-mark__label {
    position: absolute;
    top: -22px;
    left: 33.33%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
  }

  .wave {
    width: 100%;
    max-width: 320px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .wave .bar {
    width: 4px;
    background: var(--c-cry);
    border-radius: var(--r-pill);
    opacity: 0.4;
  }
  .wave .bar.live { opacity: 1; }

  .rec-action {
    display: flex; flex-direction: column; align-items: center; gap: var(--s-3);
    margin-bottom: var(--s-4);
  }
  .mic-btn {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: var(--c-cry);
    color: white;
    display: grid; place-items: center;
    box-shadow: 0 12px 32px oklch(64% 0.18 18 / 0.40);
    position: relative;
    transition: transform var(--transition);
  }
  .mic-btn.recording { background: var(--c-cry); }
  .mic-btn.recording::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid var(--c-cry);
    opacity: 0.4;
    animation: pulse 1.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  .mic-btn:active { transform: scale(0.96); }
  .mic-btn .stop-square {
    width: 28px; height: 28px;
    background: white;
    border-radius: 6px;
  }
  .mic-btn .mic-icon { width: 36px; height: 36px; }
  .stop-btn-disabled { opacity: 0.4; pointer-events: none; }

  .ctx-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: var(--s-3);
    display: flex;
    gap: var(--s-3);
    align-items: center;
    text-align: left;
  }
  .ctx-card__icon {
    width: 40px; height: 40px;
    border-radius: var(--r-md);
    background: var(--c-tip-soft);
    color: var(--c-tip);
    display: grid; place-items: center;
    flex: 0 0 auto;
  }
  .ctx-card__body { flex: 1; min-width: 0; }
  .ctx-card__t { font-size: var(--fs-13); font-weight: 700; color: var(--fg); }
  .ctx-card__d { font-size: var(--fs-12); color: var(--muted); margin-top: 2px; }

  .hint-row {
    display: flex; gap: 8px;
    font-size: var(--fs-12);
    color: var(--muted);
    align-items: center;
    justify-content: center;
  }

  .toast {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--c-cry);
    color: white;
    padding: 10px 16px;
    border-radius: var(--r-pill);
    font-size: var(--fs-13);
    font-weight: 600;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transition: opacity 250ms ease, transform 250ms ease;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body data-active-tab="cry">

    <div class="rec-mid">

      <div class="wave" id="wave"></div>

      <div class="ctx-card">
        <div class="ctx-card__icon">

        </div>
        <div class="ctx-card__body">
          <div class="ctx-card__t">함께 전송되는 컨텍스트</div>
          <div class="ctx-card__d">하늘이(생후 142일) · 마지막 수유 2시간 35분 전 · 직전 24시간 일지 요약</div>

    <div class="rec-action">
      <button class="mic-btn" id="mic" aria-pressed="false" aria-label="녹음 시작">

          <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
        </svg>
      </button>
      <div class="hint-row">
        <svg class="icon-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-12V5l-8-3-8 3v5c0 8 8 12 8 12z"/></svg>
        <span>오디오는 분석 후 즉시 삭제됩니다</span>
      </div>
      <div class="disclaimer" role="note" style="margin-top: var(--s-3); max-width: 360px;">
        <svg class="disclaimer__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span><strong>의료 조언이 아닙니다.</strong> AI 추정 결과는 참고용이며 진단·처방을 대체하지 않아요. 이상 징후 시 즉시 소아과·119 상담을 권장합니다.</span>
      </div>
    </div>
  </main>

  <div class="toast" id="toast">조금 더 녹음해야 정확한 분석이 가능해요</div>

<script src="../js/shared.js"></script>
<script>
(function () {
  const wave = document.getElementById('wave');
  const BARS = 36;
  for (let i = 0; i < BARS; i++) {
    const b = document.createElement('span');
    b.className = 'bar';
    b.style.height = '8px';
    wave.appendChild(b);
  }
  const bars = wave.children;

  const mic = document.getElementById('mic');
  const timer = document.getElementById('timer');
  const timerSub = document.getElementById('timer-sub');
  const bar = document.getElementById('bar');
  const toast = document.getElementById('toast');
  const hdTitle = document.getElementById('hd-title');
  const hdDesc = document.getElementById('hd-desc');
  const pill = document.querySelector('.rec-hd .pill');

  let recording = false;
  let startedAt = 0;
  let rafId = 0;

  function fmt(ms) {
    const s = Math.floor(ms / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return mm + ':' + ss;
  }
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }
  function loop() {
    if (!recording) return;
    const elapsed = Date.now() - startedAt;
    timer.textContent = fmt(elapsed);
    bar.style.width = Math.min(100, (elapsed / 30000) * 100) + '%';
    timerSub.textContent = elapsed >= 10000
      ? '충분합니다 · 언제든 종료해도 됩니다'
      : `최소 ${Math.ceil((10000 - elapsed) / 1000)}초 더 필요`;
    // animate bars
    for (let i = 0; i < bars.length; i++) {
      const h = 6 + Math.abs(Math.sin((elapsed / 60) + i)) * 70;
      bars[i].style.height = h + 'px';
      bars[i].classList.toggle('live', true);
    }
    if (elapsed >= 30000) {
      stop();
      return;
    }
    rafId = requestAnimationFrame(loop);
  }
  function start() {
    recording = true;
    startedAt = Date.now();
    mic.classList.add('recording');
    mic.setAttribute('aria-pressed', 'true');
    mic.setAttribute('aria-label', '녹음 종료');
    mic.innerHTML = '<span class="stop-square"></span>';
    hdTitle.textContent = '듣고 있어요';
    hdDesc.textContent = '아기 옆에서 자연스럽게 녹음됩니다';
    pill.innerHTML = '<span class="dot"></span>녹음 중';
    loop();
  }
  function stop() {
    const elapsed = Date.now() - startedAt;
    if (recording && elapsed < 10000) {
      // disallow early stop
      showToast(`${Math.ceil((10000 - elapsed) / 1000)}초만 더 녹음하면 분석할 수 있어요`);
      return;
    }
    recording = false;
    cancelAnimationFrame(rafId);
    // simulate analyze handoff
    hdTitle.textContent = '분석 중…';
    hdDesc.textContent = 'Gemini 2.5 Flash가 컨텍스트와 함께 추론하고 있어요';
    pill.innerHTML = '<span class="dot"></span>분석 중';
    setTimeout(() => { location.href = 'cry-result.html'; }, 1600);
  }
  mic.addEventListener('click', () => {
    if (!recording) start(); else stop();
  });
})();
</script>
